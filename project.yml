name: Spotter
options:
  bundleIdPrefix: com.anushreeberlia
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.35"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: Spotter/Resources/Info.plist

targets:
  Spotter:
    type: application
    platform: iOS
    sources:
      - path: Spotter
        excludes:
          - "**/*.json"
          - "Resources/Assets.xcassets"
    resources:
      - path: Spotter/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.anushreeberlia.spotter
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: Spotter/Resources/Spotter.entitlements
