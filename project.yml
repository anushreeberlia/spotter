name: Spotter
options:
  bundleIdPrefix: com.spotter
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.35"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: Spotter/Resources/Info.plist

targets:
  Spotter:
    type: application
    platform: iOS
    sources:
      - path: Spotter
        excludes:
          - "**/*.json"
          - "Resources/Assets.xcassets"
    resources:
      - path: Spotter/Resources/Assets.xcassets
      - path: Spotter/Plan/Templates
        buildPhase: resources
      - path: Spotter/Data/ReferenceData
        buildPhase: resources
      - path: Spotter/Audio/Cues
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.spotter.app
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: Spotter/Resources/Spotter.entitlements
